<!DOCTYPE html>

<html>

<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Guia</title>
    <link rel="stylesheet" href="Guia.css" />
    <style>
    </style>

</head>


<body>
    <div id="wrapper">   
    <div class="Banner_Guia_Container">
        <img
        src="https://raw.githubusercontent.com/mrfantasymanagment/MrFantasy-Web/refs/heads/main/Resources/Final/BannerMrFantasy.png" 
        class="Banner_Guia_Imagen">
    </div>

    <div class="Panel_Busqueda"> 
        <div class="PanelBusqueda_Imagen">
        </div>  
            
        <input type="text" class="PanelBusqueda_Buscador"  placeholder="Buscar" id="PanelBusqueda_Buscador" name="PanelBusqueda_Buscador" spellcheck="false">
        
        <button class="PanelBusqueda_Lupa">🔎︎</button>
        
        <div class="PanelBusqueda_Secciones">
            <div class="Plugins">Plugins</div>
            <div class="Guias">Guias</div>
            <div class="Commandos">Commandos</div>
            <div class="Items">Items</div>
            <div class="Enchants">Enchants</div>
            <div class="Quests">Quests</div>
            <div class="NPCs">NPCs</div>
            <div class="Eventos">Eventos</div>
            <div class="Changelog">Changelog</div>
            <div class="Bugs">Bugs</div>
            <div class="Plugins Seccion_Boton"></div>
            <div class="Guias Seccion_Boton"></div>
            <div class="Commandos Seccion_Boton"></div>
            <div class="Items Seccion_Boton"></div>
            <div class="Enchants Seccion_Boton"></div>
            <div class="Quests Seccion_Boton"></div>
            <div class="NPCs Seccion_Boton"></div>
            <div class="Eventos Seccion_Boton"></div>
            <div class="Changelog Seccion_Boton"></div>
            <div class="Bugs Seccion_Boton"></div>
        </div>        
        
        <div class="PanelBusqueda_Tags">
        </div>        

    </div>

    <div id="contenedor-plugins">

        
        <a class="Plugin_Link" href="https://mrfantasymanagment.github.io/MrFantasy-Web/Subpages/Staff/Guia_Staff.html" style="text-decoration: none;">
            <div class="Plugin_Container">
                <div class="Nombre_Campo">
                    <div class="hproyectos">Nombre</div>
                </div>
                <div class="Descripcion_Campo">
                    <div class="hproyectos2">Descripcion</div>
                </div>
                <div class="Comandos_Campo">
                    <div class="hproyectos2">Comandos</div>
                </div>
                <div class="Imagen_Campo">
                <img
                    src="https://raw.githubusercontent.com/mrfantasymanagment/MrFantasy-Web/refs/heads/main/Resources/Final/Instagram.png" 
                    class="Instagram_Imagen">
                </div>

                <button class="Editar_Plugin_Boton" onclick="editarPlugin('${datos.Nombre}')">Editar</button>
            </div>
            </a>

            <a href="$https://raw.githubusercontent.com/mrfantasymanagment/MrFantasy-Web/refs/heads/main/Resources/Final/BannerMrFantasy.png" style="text-decoration: none;">
                <div class="Plugin_Container">
                    <div class="Nombre_Campo">
                        <div class="hproyectos">TestCss</div>
                    </div>
                    <div class="Descripcion_Campo">
                        <div class="hproyectos2">DescTestCss</div>
                    </div>
                    <div class="Comandos_Campo">
                        <div class="Comando_Campo_1">Test Comando 1</div>
                        <div class="Comando_Campo_2">Test Comando 2</div>
                        <div class="Comando_Campo_3">Test Comando 3</div>
                        <div class="Comando_Campo_4">Test Comando 4</div>
                        <div class="Comando_Campo_5">Test Comando 5</div>
                        <div class="Comando_Campo_6">Test Comando 6</div>
                        <div class="Comando_Campo_7">Test Comando 7</div>
                        <div class="Comando_Campo_8">Test Comando 8</div>
                        <div class="Comando_Campo0">Sin Comandos</div>
                    </div>
                    <div class="Imagen_Campo">
                        <img src="https://raw.githubusercontent.com/mrfantasymanagment/MrFantasy-Web/refs/heads/main/Resources/Final/BannerMrFantasy.png" class="Plugin_Imagen">
                    </div>
                    <button class="Editar_Plugin_Boton" onclick="event.preventDefault(); editarPlugin('TestCss')">E</button>
                </div>
                </a>

            <div id="Reportes_Agradecimiento">
                <div id="Reportes_Modal">
                    <p>Sesion Iniciada</p>
                    <div id="Reportes_Cerrar">Cerrar</div>
                </div>
            </div>
    </div>

    </div>
    <script src="Guia.js"></script>
</body>
</html>
